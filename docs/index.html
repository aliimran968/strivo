<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strivo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #1A1208;
      color: #F0E6D3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .wordmark {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 10px;
      color: #C9933A;
      margin-bottom: 16px;
    }
    .tagline {
      font-size: 16px;
      color: #9A8A72;
      margin-bottom: 40px;
    }
    a {
      color: #C9933A;
      text-decoration: none;
      font-size: 15px;
      border: 1px solid #3D2E1A;
      padding: 10px 24px;
      border-radius: 8px;
    }
    a:hover { background: #231A0E; }
  </style>
</head>
<body>
  <div class="wordmark">STRIVO</div>
  <p class="tagline">For anyone building anything.</p>
  <a href="/strivo/privacy-policy">Privacy Policy</a>
</body>
</html>
